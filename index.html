<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AldanFilm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            background-color: #0b0f1a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .header-gradient {
            background: linear-gradient(180deg, rgba(225, 29, 72, 0.2) 0%, rgba(11, 15, 26, 0) 100%);
        }

        .link-card {
            background: #161d2f;
            border: 1px solid #1e293b;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .link-card:active {
            transform: scale(0.96);
            border-color: #e11d48;
            background: #1e293b;
        }

        .category-title {
            border-left: 4px solid #e11d48;
            padding-left: 12px;
            margin: 24px 0 16px 0;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        #floating-back {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: #e11d48;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(225, 29, 72, 0.4);
            display: none;
            align-items: center;
            gap: 10px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .search-bar {
            background: #1e293b;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: #e11d48;
            box-shadow: 0 0 0 2px rgba(225, 29, 72, 0.2);
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="pb-24">

    <!-- Splash/Header Section -->
    <div id="main-ui">
        <div class="header-gradient pt-12 pb-6 px-6 text-center">
            <h1 class="text-4xl font-extrabold italic text-white mb-1">AldanFilm<span class="text-rose-600">11</span></h1>
            <p class="text-slate-500 text-[10px] tracking-[0.4em] uppercase font-bold">AldanKina23Film</p>
        </div>

        <!-- Search Bar -->
        <div class="px-6 mb-4">
            <div class="search-bar flex items-center px-4 py-3 rounded-xl">
                <span class="text-slate-500 mr-3">🔍</span>
                <input type="text" id="searchInput" onkeyup="filterLinks()" placeholder="Cari nama situs..." class="bg-transparent w-full text-sm outline-none text-white">
            </div>
        </div>

        <!-- Category Tabs (Horizontal Scroll) -->
        <div class="flex gap-3 px-6 overflow-x-auto no-scrollbar mb-4">
            <button onclick="scrollToCat('cat-movie')" class="whitespace-nowrap bg-slate-800 px-4 py-2 rounded-full text-xs font-bold hover:bg-rose-600 transition">Movies</button>
            <button onclick="scrollToCat('cat-anime')" class="whitespace-nowrap bg-slate-800 px-4 py-2 rounded-full text-xs font-bold hover:bg-rose-600 transition">Anime</button>
            <button onclick="scrollToCat('cat-tv')" class="whitespace-nowrap bg-slate-800 px-4 py-2 rounded-full text-xs font-bold hover:bg-rose-600 transition">TV & Sports</button>
            <button onclick="scrollToCat('cat-adult')" class="whitespace-nowrap bg-slate-800 px-4 py-2 rounded-full text-xs font-bold hover:bg-rose-600 transition">Adult 18+</button>
        </div>

        <!-- Content Area -->
        <div id="linksContainer" class="px-6">
            <!-- Categories and links will be injected here -->
        </div>
    </div>

    <!-- Floating Back Button -->
    <button id="floating-back" onclick="goBackToMenu()">
        <span class="flex h-2 w-2 rounded-full bg-white animate-pulse"></span>
        KEMBALI KE MENU
    </button>

    <script>
        const linkData = [
            { name: "LK21", url: "https://tv10.lk21official.cc/", cat: "movie" },
            { name: "Layarkaca", url: "https://lk21.de", cat: "movie" },
            { name: "FufaFilm", url: "https://fufafilm.cyou", cat: "movie" },
            { name: "Kawanfilm21", url: "https://tv2.kawanfilm21.co", cat: "movie" },
            { name: "KlikXXi", url: "https://klikxxi.me", cat: "movie" },
            { name: "Indomax21", url: "https://elhombreamadecasa.com/", cat: "movie" },
            { name: "BaladFilm", url: "https://tv4.baladfilm.asia/", cat: "movie" },
            { name: "NgeFilm21", url: "https://new31.ngefilm.site", cat: "movie" },
            { name: "Ngefilm", url: "https://new30.ngefilm.site", cat: "movie" },
            { name: "Nomat", url: "https://nomat.site", cat: "movie" },
            { name: "Sflix", url: "https://sflix.film", cat: "movie" },
            { name: "Pencuri Movie", url: "https://ww99.pencurimovie.bond", cat: "movie" },
            { name: "Sarangfilm", url: "https://sarangfilm.link", cat: "movie" },
            
            { name: "Netflix", url: "https://net22.cc", cat: "tv" },
            { name: "Disney Plus", url: "https://net22.cc/home", cat: "tv" },
            { name: "Prime Video", url: "https://net52.cc", cat: "tv" },
            { name: "GvisionTv", url: "https://rebrand.ly/csgvc", cat: "tv" },
            { name: "MovieBox (API)", url: "https://api3.aoneroom.com", cat: "tv" },
            { name: "Moviebox (Web)", url: "https://h5.aoneroom.com", cat: "tv" },
            { name: "YouTube", url: "https://www.youtube.com", cat: "tv" },
            { name: "Netnaija", url: "https://netnaija.film", cat: "tv" },
            { name: "XemTv24", url: "https://www.xemtv24.com/", cat: "tv" },

            { name: "Anichin", url: "https://anichin.moe/", cat: "anime" },
            { name: "Donghuastream", url: "https://donghuastream.org/", cat: "anime" },
            { name: "Donghub", url: "https://donghub.vip/", cat: "anime" },
            { name: "Curonime", url: "https://kuronime.sbs", cat: "anime" },
            { name: "Oploverz", url: "https://anime.oploverz.ac", cat: "anime" },
            { name: "OtakuDesu", url: "https://otakudesu.blog", cat: "anime" },
            { name: "Samehadaku", url: "https://v1.samehadaku.how", cat: "anime" },
            { name: "OppaDrama", url: "http://45.11.57.125", cat: "anime" },

            { name: "JavHey", url: "https://javhey.com/", cat: "adult" },
            { name: "JavTrailers", url: "https://javtrailers.com", cat: "adult" },
            { name: "PornHubs", url: "https://www.pornhub.com/", cat: "adult" },
            { name: "Xnxx", url: "https://www.xnxx.com/", cat: "adult" },
            { name: "JableTv", url: "https://en.jable.tv/", cat: "adult" },
            { name: "JavTiful", url: "https://javtiful.com/videos", cat: "adult" },
            { name: "MissAv", url: "https://missav.ws/dm223/en", cat: "adult" },
            { name: "TnaFlix", url: "https://www.tnaflix.com", cat: "adult" }
        ];

        function renderLinks(filter = "") {
            const container = document.getElementById('linksContainer');
            container.innerHTML = "";
            
            const categories = {
                "cat-movie": { title: "Movies & Cinema", icon: "🎬", items: [] },
                "cat-tv": { title: "TV, Netflix & Originals", icon: "📺", items: [] },
                "cat-anime": { title: "Anime & Donghua", icon: "⛩️", items: [] },
                "cat-adult": { title: "Adult 18+", icon: "🔞", items: [] }
            };

            linkData.forEach(link => {
                if (link.name.toLowerCase().includes(filter.toLowerCase())) {
                    categories[`cat-${link.cat}`].items.push(link);
                }
            });

            for (const key in categories) {
                const cat = categories[key];
                if (cat.items.length > 0) {
                    const section = document.createElement('div');
                    section.id = key;
                    section.innerHTML = `<h3 class="category-title">${cat.icon} ${cat.title}</h3>`;
                    
                    const grid = document.createElement('div');
                    grid.className = "grid grid-cols-1 sm:grid-cols-2 gap-3";
                    
                    cat.items.forEach(item => {
                        grid.innerHTML += `
                            <div class="link-card p-4 rounded-xl cursor-pointer" onclick="openLink('${item.url}')">
                                <div class="flex flex-col">
                                    <span class="font-bold text-sm">${item.name}</span>
                                    <span class="text-[9px] text-slate-500 truncate max-w-[200px]">${item.url}</span>
                                </div>
                                <span class="text-rose-600 text-xs">GO ▶</span>
                            </div>
                        `;
                    });
                    
                    section.appendChild(grid);
                    container.appendChild(section);
                }
            }
        }

        function openLink(url) {
            sessionStorage.setItem('activeSession', 'true');
            // Langsung arahkan ke URL (Best for playing video without iframe errors)
            window.location.href = url;
        }

        function goBackToMenu() {
            sessionStorage.removeItem('activeSession');
            window.location.href = window.location.pathname;
        }

        function filterLinks() {
            const val = document.getElementById('searchInput').value;
            renderLinks(val);
        }

        function scrollToCat(id) {
            const el = document.getElementById(id);
            if(el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        window.onload = () => {
            if (sessionStorage.getItem('activeSession') === 'true') {
                document.getElementById('floating-back').style.display = 'flex';
                document.getElementById('main-ui').style.opacity = '0.3';
            }
            renderLinks();
        };
    </script>
</body>
</html>
